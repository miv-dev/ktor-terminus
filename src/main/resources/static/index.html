<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormGraph — Client Application</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #606060;
      --accent: #4a9eff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      font-size: 13px;
      display: flex;
      gap: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT PANEL: Form ─────────────────────────────────────────── */
    #form-panel {
      flex: 0 0 480px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .panel-header h2 { font-size: 14px; color: var(--accent); margin-bottom: 4px; }
    .panel-header .subtitle { color: var(--muted); font-size: 11px; }

    .role-selector {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      align-items: center;
    }
    .role-label { color: var(--muted); font-size: 11px; margin-right: 4px; }
    .role-btn {
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.1); }

    #form-fields { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: opacity 0.2s;
    }
    .field-row[data-visible="false"] { opacity: 0.15; pointer-events: none; }
    .field-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .required-badge { color: var(--red); font-size: 10px; font-weight: bold; }
    .field-row input, .field-row select, .field-row textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: var(--accent); }
    .field-row[data-valid="false"] input,
    .field-row[data-valid="false"] select,
    .field-row[data-valid="false"] textarea { border-color: var(--red); }
    .field-row[data-valid="true"] input,
    .field-row[data-valid="true"] select,
    .field-row[data-valid="true"] textarea { border-color: var(--green); }
    .field-row[data-readonly="true"] input,
    .field-row[data-readonly="true"] select,
    .field-row[data-readonly="true"] textarea { opacity: 0.5; pointer-events: none; }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--border); }
      50%       { border-color: var(--accent); }
    }
    .field-row select.fetching {
      opacity: 0.5; pointer-events: none;
      animation: pulse-border 1s ease-in-out infinite;
    }
    .validation-msg { color: var(--red); font-size: 11px; min-height: 14px; }
    .hints { display: flex; flex-wrap: wrap; gap: 4px; }
    .hint-badge {
      font-size: 10px;
      padding: 1px 6px;
      background: rgba(210,153,34,0.2);
      color: var(--yellow);
      border: 1px solid rgba(210,153,34,0.4);
    }
    .vis-badge {
      font-size: 10px;
      padding: 1px 5px;
    }
    .vis-badge.shown { background: rgba(63,185,80,0.15); color: var(--green); }
    .vis-badge.hidden { background: rgba(248,81,73,0.15); color: var(--red); }

    #submit-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 12px;
    }
    #submit-btn {
      padding: 8px 24px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: inherit; font-size: 13px; cursor: pointer;
      transition: background 0.15s;
    }
    #submit-btn:hover:not(:disabled) { background: rgba(63,185,80,0.1); }
    #submit-btn:disabled { border-color: var(--border); color: var(--muted); cursor: not-allowed; }
    #submit-status { font-size: 11px; }

    /* ── RIGHT PANEL ──────────────────────────────────────────────── */
    #version-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #signal-log-panel {
      flex: 0 0 200px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #history-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #rules-panel {
      flex: 0 0 auto;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      max-height: 320px;
    }
    #rules-panel.collapsed { max-height: 38px; overflow: hidden; }
    #rules-content {
      flex: 1; overflow-y: auto; padding: 10px 14px;
      font-size: 11px; color: #a0c4ff;
      white-space: pre; font-family: inherit;
      background: #0a0a14;
    }
    .toggle-btn {
      background: transparent; border: none; color: var(--muted);
      font-family: inherit; font-size: 11px; cursor: pointer; padding: 0 6px;
    }
    .toggle-btn:hover { color: var(--accent); }

    .log-area { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 11px; color: var(--muted); }
    .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-line .ts { color: var(--muted); margin-right: 8px; }
    .tag-ws { color: var(--accent); }
    .tag-signal { color: var(--green); }
    .tag-err { color: var(--red); }
    .tag-send { color: var(--yellow); }

    .history-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .commit-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .commit-row:hover { background: var(--surface); }
    .commit-id { color: var(--accent); font-size: 11px; flex: 0 0 80px; overflow: hidden; text-overflow: ellipsis; }
    .commit-msg { flex: 1; color: var(--text); font-size: 12px; }
    .commit-ts { color: var(--muted); font-size: 10px; flex: 0 0 80px; text-align: right; }
    .checkout-btn {
      padding: 3px 8px; background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 10px; cursor: pointer;
    }
    .checkout-btn:hover { border-color: var(--yellow); color: var(--yellow); }

    #diff-view {
      padding: 12px 14px; background: var(--surface); border-top: 1px solid var(--border);
      font-size: 11px; white-space: pre-wrap; color: var(--muted);
      max-height: 200px; overflow-y: auto;
    }

    .status-bar {
      padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; font-size: 11px;
    }
    .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
    .ws-dot.connected { background: var(--green); }
    .ws-label { color: var(--muted); }
    #refresh-history-btn {
      margin-left: auto; padding: 3px 10px; background: transparent;
      border: 1px solid var(--border); color: var(--muted); font-family: inherit;
      font-size: 11px; cursor: pointer;
    }
    #refresh-history-btn:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

<!-- LEFT: Form -->
<div id="form-panel">
  <div class="panel-header" style="display:flex;align-items:center;">
    <div style="flex:1">
      <h2>Заявка клиента</h2>
      <div class="subtitle">FormGraph — ASP rules engine + bidirectional WebSocket</div>
    </div>
    <button onclick="loadSchema()" style="padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;">↻ Reload</button>
  </div>
  <div class="role-selector">
    <span class="role-label">ROLE:</span>
    <button class="role-btn active" id="role-user" onclick="switchRole('user')">user</button>
    <button class="role-btn" id="role-viewer" onclick="switchRole('viewer')">viewer</button>
  </div>
  <div id="form-fields"><!-- rendered by JS --></div>
  <div id="submit-bar">
    <button id="submit-btn" disabled onclick="submitForm()">Submit</button>
    <span id="submit-status"></span>
  </div>
</div>

<!-- RIGHT: Signals + History -->
<div id="version-panel">
  <div id="signal-log-panel">
    <div class="status-bar">
      <div class="ws-dot" id="ws-dot"></div>
      <span class="ws-label" id="ws-status">WebSocket: disconnected</span>
      <span id="signal-count" style="color:var(--muted)"></span>
    </div>
    <div class="panel-header"><h2>Signal Log</h2></div>
    <div class="log-area" id="signal-log"></div>
  </div>

  <div id="history-panel">
    <div class="panel-header" style="display:flex;align-items:center;">
      <h2 style="flex:1">Commit History</h2>
      <button id="refresh-history-btn" onclick="loadHistory()">↻ Refresh</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div id="diff-view" style="display:none"></div>
  </div>

  <div id="rules-panel" class="collapsed">
    <div class="panel-header" style="display:flex;align-items:center;padding:8px 14px;">
      <h2 style="flex:1;font-size:13px;">ASP Rules <span id="rules-badge" style="color:var(--muted);font-size:10px;font-weight:normal;"></span></h2>
      <button class="toggle-btn" onclick="loadRules()">↻</button>
      <button class="toggle-btn" id="rules-toggle" onclick="toggleRules()">▲ expand</button>
    </div>
    <pre id="rules-content"></pre>
  </div>
</div>

<script>
const FORM_ID = 'client_form';
const API = `http://${location.host}/api/forms/${FORM_ID}`;
const WS_URL = `ws://${location.host}/ws/form/${FORM_ID}`;

let ws = null;
let currentRole = 'user';
let selectedCommits = [];
let FIELD_DEFS = [];
let sessionId = crypto.randomUUID();

// ── Schema load ───────────────────────────────────────────────────────────────
function loadSchema() {
  fetch(API)
    .then(r => r.json())
    .then(schema => {
      FIELD_DEFS = schema.fields;
      renderFields();
      logLine(`schema loaded: ${FIELD_DEFS.length} fields`, 'tag-signal');
    })
    .catch(e => logLine(`schema load error: ${e.message}`, 'tag-err'));
}

// ── Render form fields ────────────────────────────────────────────────────────
function renderFields() {
  const container = document.getElementById('form-fields');
  container.innerHTML = '';
  FIELD_DEFS.forEach(f => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.id = 'row-' + f.id;
    row.dataset.visible = 'true';

    const label = document.createElement('label');
    label.id = 'label-' + f.id;
    label.innerHTML = `<span>${f.label}</span><span class="vis-badge shown" id="vis-${f.id}">visible</span>`;

    let input;
    if (f.type === 'SELECT') {
      input = document.createElement('select');
      input.innerHTML = '<option value="">— выберите —</option>' +
        (f.options || []).map(o => `<option value="${o}">${o}</option>`).join('');
      input.onchange = () => sendEvent({ type: 'FieldChanged', fieldId: f.id, value: input.value });
    } else {
      input = document.createElement('input');
      input.type = f.type === 'EMAIL' ? 'email' : f.type === 'PHONE' ? 'tel' : 'text';
      input.placeholder = f.placeholder || '';
      input.oninput = () => sendEvent({ type: 'FieldChanged', fieldId: f.id, value: input.value });
      input.onblur = () => sendEvent({ type: 'FieldBlurred', fieldId: f.id });
    }
    input.id = 'input-' + f.id;

    const msg = document.createElement('div');
    msg.className = 'validation-msg';
    msg.id = 'msg-' + f.id;

    const hints = document.createElement('div');
    hints.className = 'hints';
    hints.id = 'hints-' + f.id;

    row.appendChild(label);
    row.appendChild(input);
    row.appendChild(msg);
    row.appendChild(hints);
    container.appendChild(row);
  });
}

// ── Apply a single FieldSignal ────────────────────────────────────────────────
function applySignal(sig) {
  // Submit sentinel — no DOM row, handle before the row guard
  if (sig.fieldId === '__submit__') {
    const btn = document.getElementById('submit-btn');
    if (btn) btn.disabled = !sig.visible;
    if (sig.hints && sig.hints.length > 0) {
      const statusEl = document.getElementById('submit-status');
      if (sig.hints.includes('submitted')) {
        statusEl.style.color = 'var(--green)';
        statusEl.textContent = `Sent — ${sig.validationMessage || ''}`;
      } else if (sig.hints.includes('submit_error')) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = `Error — ${sig.validationMessage || ''}`;
      }
    }
    return;
  }

  const row = document.getElementById('row-' + sig.fieldId);
  if (!row) return;

  row.dataset.visible = sig.visible ? 'true' : 'false';
  row.dataset.valid = sig.valid == null ? '' : sig.valid ? 'true' : 'false';
  row.dataset.readonly = sig.readOnly ? 'true' : 'false';

  const visBadge = document.getElementById('vis-' + sig.fieldId);
  if (visBadge) {
    visBadge.textContent = sig.visible ? 'visible' : 'hidden';
    visBadge.className = 'vis-badge ' + (sig.visible ? 'shown' : 'hidden');
  }

  const label = document.getElementById('label-' + sig.fieldId);
  if (label) {
    let reqSpan = label.querySelector('.required-badge');
    if (sig.required && !reqSpan) {
      reqSpan = document.createElement('span');
      reqSpan.className = 'required-badge';
      reqSpan.textContent = '* required';
      label.insertBefore(reqSpan, label.querySelector('.vis-badge'));
    } else if (!sig.required && reqSpan) {
      reqSpan.remove();
    }
  }

  const input = document.getElementById('input-' + sig.fieldId);
  if (input) {
    input.disabled = sig.readOnly || !sig.visible;
  }

  const msg = document.getElementById('msg-' + sig.fieldId);
  if (msg) msg.textContent = sig.validationMessage || '';

  const hintsEl = document.getElementById('hints-' + sig.fieldId);
  if (hintsEl) {
    hintsEl.innerHTML = (sig.hints || [])
      .map(h => `<span class="hint-badge">${h}</span>`).join('');
  }

  // Dynamic options (e.g. cities populated from external API)
  if (sig.options && sig.options.length > 0) {
    setFieldLoading(sig.fieldId, false);
    const sel = document.getElementById('input-' + sig.fieldId);
    if (sel && sel.tagName === 'SELECT') {
      const prev = sel.value;
      sel.innerHTML = '<option value="">— выберите —</option>' +
        sig.options.map(o => `<option value="${o}"${o === prev ? ' selected' : ''}>${o}</option>`).join('');
    }
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-status').textContent = 'WebSocket: connected';
    logLine('connected', 'tag-ws');
    // Send initial role
    sendEvent({ type: 'SessionStarted', role: currentRole });
  };

  ws.onmessage = (evt) => {
    try {
      const sig = JSON.parse(evt.data);
      // Handle both individual signal and array (from initial direct send)
      if (Array.isArray(sig)) {
        sig.forEach(applySignal);
        logLine(`recv ${sig.length} signal(s)`, 'tag-signal');
      } else {
        applySignal(sig);
        const hint = sig.hints && sig.hints.length ? ` [${sig.hints.join(',')}]` : '';
        logLine(`${sig.fieldId}: vis=${sig.visible} req=${sig.required}${hint}`, 'tag-signal');
        document.getElementById('signal-count').textContent = sig.fieldId;
      }
    } catch (e) {
      logLine(`parse error: ${e.message}`, 'tag-err');
    }
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-status').textContent = 'WebSocket: reconnecting...';
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => logLine('WebSocket error', 'tag-err');
}

function setFieldLoading(fieldId, loading) {
  const sel = document.getElementById('input-' + fieldId);
  if (!sel || sel.tagName !== 'SELECT') return;
  if (loading) {
    sel.classList.add('fetching');
    sel.innerHTML = '<option value="">— loading... —</option>';
  } else {
    sel.classList.remove('fetching');
  }
}

function sendEvent(event) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(event));
    logLine(`send: ${JSON.stringify(event)}`, 'tag-send');
    // Show loading state on any field whose dataSource is triggered by this field
    if (event.type === 'FieldChanged') {
      FIELD_DEFS.forEach(f => {
        if (f.dataSource?.triggerField === event.fieldId) setFieldLoading(f.id, true);
      });
    }
  }
}

// ── Submit ────────────────────────────────────────────────────────────────────
function submitForm() {
  document.getElementById('submit-status').textContent = 'Submitting...';
  document.getElementById('submit-status').style.color = 'var(--muted)';
  sendEvent({ type: 'FormSubmitAttempted', sessionId });
}

// ── Role switcher ─────────────────────────────────────────────────────────────
function switchRole(role) {
  currentRole = role;
  document.getElementById('role-user').classList.toggle('active', role === 'user');
  document.getElementById('role-viewer').classList.toggle('active', role === 'viewer');
  sendEvent({ type: 'SessionStarted', role });
}

// ── Logging ───────────────────────────────────────────────────────────────────
function logLine(msg, cls) {
  const log = document.getElementById('signal-log');
  const line = document.createElement('div');
  line.className = 'log-line';
  const ts = new Date().toTimeString().slice(0, 8);
  line.innerHTML = `<span class="ts">${ts}</span><span class="${cls}">${msg}</span>`;
  log.appendChild(line);
  if (log.children.length > 300) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// ── History ───────────────────────────────────────────────────────────────────
function loadHistory() {
  fetch(`${API}/history`)
    .then(r => r.json())
    .then(renderHistory)
    .catch(e => logLine(`history error: ${e.message}`, 'tag-err'));
}

function renderHistory(commits) {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!commits || !commits.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--muted)">No commits found</div>';
    return;
  }
  commits.forEach(c => {
    const row = document.createElement('div');
    row.className = 'commit-row';
    const shortId = (c.id || '').slice(0, 10);
    const ts = c.timestamp ? new Date(c.timestamp * 1000).toLocaleString('ru') : '';
    row.innerHTML = `
      <span class="commit-id">${shortId}</span>
      <span class="commit-msg">${c.message || '(no message)'}</span>
      <span class="commit-ts">${ts}</span>
      <button class="checkout-btn" onclick="checkout('${c.id}')">checkout</button>
    `;
    row.onclick = e => {
      if (e.target.classList.contains('checkout-btn')) return;
      toggleCommitSelect(c.id, row);
    };
    list.appendChild(row);
  });
}

function toggleCommitSelect(id, row) {
  const idx = selectedCommits.indexOf(id);
  if (idx !== -1) return;
  selectedCommits.push(id);
  row.style.background = 'rgba(74,158,255,0.1)';
  if (selectedCommits.length === 2) {
    loadDiff(selectedCommits[0], selectedCommits[1]);
    selectedCommits = [];
    setTimeout(() => document.querySelectorAll('.commit-row').forEach(r => r.style.background = ''), 1500);
  }
}

function loadDiff(from, to) {
  fetch(`${API}/diff?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`)
    .then(r => r.json())
    .then(diff => {
      const view = document.getElementById('diff-view');
      view.style.display = 'block';
      view.textContent = JSON.stringify(diff, null, 2);
      logLine(`diff: ${from.slice(0,8)} → ${to.slice(0,8)}`, 'tag-signal');
    })
    .catch(e => logLine(`diff error: ${e.message}`, 'tag-err'));
}

function checkout(commitId) {
  if (!confirm(`Checkout commit ${commitId.slice(0,10)}?`)) return;
  fetch(`${API}/checkout/${encodeURIComponent(commitId)}`, { method: 'POST' })
    .then(r => r.json())
    .then(() => {
      logLine(`checked out ${commitId.slice(0,10)}`, 'tag-signal');
      loadSchema();
    })
    .catch(e => logLine(`checkout error: ${e.message}`, 'tag-err'));
}

// ── Rules viewer ─────────────────────────────────────────────────────────────
function loadRules() {
  fetch(`${API}/rules`)
    .then(r => r.json())
    .then(rs => {
      document.getElementById('rules-content').textContent = rs.lpContent;
      document.getElementById('rules-badge').textContent = `(${rs.lpContent.split('\n').length} lines)`;
      logLine('rules loaded', 'tag-signal');
    })
    .catch(e => logLine(`rules error: ${e.message}`, 'tag-err'));
}

function toggleRules() {
  const panel = document.getElementById('rules-panel');
  const btn = document.getElementById('rules-toggle');
  const collapsed = panel.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▲ expand' : '▼ collapse';
  if (!collapsed && !document.getElementById('rules-content').textContent) loadRules();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadSchema();
  connectWS();
  setTimeout(loadHistory, 1000);
});
</script>
</body>
</html>
